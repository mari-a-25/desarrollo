name: Social Listening Scraper

on:
  schedule:
    # Ejecutar cada 12 horas (06:00 y 18:00 UTC → 02:00 y 14:00 AST)
    - cron: "0 6,18 * * *"
  workflow_dispatch:    # Permite ejecución manual desde GitHub UI
    inputs:
      dry_run:
        description: "Dry run (no guarda en BD)"
        required: false
        default: "false"
        type: boolean

env:
  PYTHON_VERSION: "3.12"

jobs:
  scrape:
    name: Recolectar menciones
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Instalar dependencias ──────────────────────────────
      - name: Install Python dependencies
        working-directory: ./scraper
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Instalar Playwright browsers ───────────────────────
      - name: Install Playwright Chromium
        working-directory: ./scraper
        run: |
          python -m playwright install chromium --with-deps

      # ── 5. Ejecutar scraper ───────────────────────────────────
      - name: Run social listening scraper
        working-directory: ./scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AZURE_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_LANGUAGE_ENDPOINT }}
          AZURE_LANGUAGE_KEY: ${{ secrets.AZURE_LANGUAGE_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN MODE ==="
            python main.py --dry-run
          else
            python main.py
          fi

      # ── 6. Subir logs como artifact ───────────────────────────
      - name: Upload scraper logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-logs-${{ github.run_number }}
          path: scraper/scraper.log
          retention-days: 7

      # ── 7. Notificar en caso de error ─────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::El scraper falló. Revisar los logs para más detalles."
          echo "::notice::Ejecutar manualmente desde: GitHub Actions > Social Listening Scraper > Run workflow"
