name: Social Listening Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Ejecutar cada 12 horas (medianoche y mediodía)
  workflow_dispatch: # Permite disparar el scraper manualmente desde la pestaña Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper & Cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Azure AI Language (Opcional, si no está configurado el scraper usará modo neutral)
          AZURE_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_LANGUAGE_ENDPOINT }}
          AZURE_LANGUAGE_KEY: ${{ secrets.AZURE_LANGUAGE_KEY }}
        run: |
          cd scraper
          echo "Iniciando recolección de menciones..."
          python main.py
          echo "Iniciando limpieza de datos e identificación de demo..."
          python run_cleanup.py
          echo "Proceso completado satisfactoriamente."
